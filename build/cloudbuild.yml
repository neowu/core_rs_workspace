steps:
  - name: gcr.io/cloud-builders/docker
    args: ["buildx", "create", "--use"]
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "buildx",
        "build",
        "-f",
        "${_DOCKERFILE}",
        "-t",
        "${_IMAGE}:${_TAG}",
        "-t",
        "${_IMAGE}:latest",
        "--cache-from",
        "type=registry,ref=${_IMAGE}:buildcache",
        "--cache-to",
        "type=registry,ref=${_IMAGE}:buildcache,mode=max,image-manifest=true",
        "--push",
        ".",
      ]
timeout: 3600s
options:
  substitutionOption: ALLOW_LOOSE
  machineType: E2_HIGHCPU_8
tags: ["${_APP}"]
